services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: watchtower
      POSTGRES_USER: watchtower
      POSTGRES_PASSWORD: watchtower
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchtower -d watchtower"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2026-06-02T03-44-20Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: watchtower
      MINIO_ROOT_PASSWORD: watchtower-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8000:8000"
    command: uvicorn api.app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    command: python -m worker.runner
    volumes:
      - .:/app
      - worker-cache:/tmp/watchtower

  scheduler:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m worker.scheduler
    volumes:
      - .:/app

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:80"

volumes:
  postgres-data:
  minio-data:
  worker-cache:
